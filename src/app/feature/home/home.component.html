<section id="home" class="h-dvh flex items-center justify-center text-center px-6 bg-bg-primary">
  <div class="max-w-[520px]">
    <blockquote
      class="text-[17px] md:text-xl text-text-secondary italic leading-relaxed"
      [pfTypewriter]="'\u201C' + currentQuote().text + '\u201D'"
      (deleted)="onQuoteDeleted()"
    ></blockquote>
    <cite class="block mt-3 text-[13px] text-text-muted not-italic">
      {{ currentQuote().author }}
    </cite>

    <div class="mt-10">
      <a
        href="assets/cv.pdf"
        download="Dusan_Draskovic_CV.pdf"
        class="inline-flex items-center gap-2 bg-accent hover:bg-accent-light text-white px-7 py-3 rounded-lg text-[13px] font-medium transition-colors tracking-wider"
      >
        <svg
          class="w-[14px] h-[14px]"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download CV
      </a>
    </div>

    <div class="mt-7 flex items-center justify-center gap-2 text-[13px] text-text-muted">
      <a
        [href]="GITHUB_SOCIAL_LINK.url"
        target="_blank"
        rel="noopener noreferrer"
        class="hover:text-accent transition-colors"
      >
        GitHub
      </a>
      <span class="select-none">&middot;</span>
      <a
        [href]="LINKEDIN_SOCIAL_LINK.url"
        target="_blank"
        rel="noopener noreferrer"
        class="hover:text-accent transition-colors"
      >
        LinkedIn
      </a>
      <span class="select-none">&middot;</span>
      <a [href]="EMAIL_SOCIAL_LINK.url" class="hover:text-accent transition-colors">Email</a>
    </div>
  </div>
</section>
