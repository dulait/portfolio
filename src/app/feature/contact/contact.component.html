<section id="contact" class="py-20 px-6 bg-bg-primary">
  <div class="max-w-[800px] mx-auto">
    <h2
      class="text-2xl md:text-3xl font-bold text-text-primary tracking-tight after:content-[''] after:block after:w-9 after:h-0.5 after:bg-accent after:mt-3 after:rounded-sm"
    >
      Contact
    </h2>

    <p class="mt-8 text-[15px] text-text-secondary leading-relaxed">
      Always open to connect and exchange ideas around interesting projects and technical
      challenges.
    </p>

    <div class="mt-10 flex flex-col gap-3">
      @for (method of contactMethods; track method.platform) {
        <a
          [href]="method.url"
          [target]="method.isExternal ? '_blank' : undefined"
          [rel]="method.isExternal ? 'noopener noreferrer' : undefined"
          class="flex items-center justify-between bg-bg-surface border border-border-subtle rounded-lg px-5 py-4 transition-all duration-200 hover:border-border-hover hover:-translate-y-0.5 group"
        >
          <span class="text-[14px]">
            <span class="text-text-primary font-medium">{{ method.platform }}</span>
            <span class="text-text-muted ml-3 hidden sm:inline">{{ method.label }}</span>
          </span>
          <span class="text-text-muted group-hover:text-accent transition-colors text-[13px]"
            >&rarr;</span
          >
        </a>
      }
    </div>
  </div>
</section>
