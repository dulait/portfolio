<section id="projects" class="py-20 px-6 bg-bg-primary">
  <div class="max-w-[800px] mx-auto">
    <h2
      class="text-2xl md:text-3xl font-bold text-text-primary tracking-tight after:content-[''] after:block after:w-9 after:h-0.5 after:bg-accent after:mt-3 after:rounded-sm"
    >
      Projects
    </h2>

    <div class="mt-10 grid md:grid-cols-2 gap-5">
      @for (project of projects; track $index) {
        <div
          class="flex flex-col bg-bg-surface border border-border-subtle rounded-xl p-6 md:p-8 transition-all duration-200 hover:border-border-hover hover:-translate-y-0.5 hover:shadow-[0_4px_12px_rgba(0,0,0,0.25)]"
        >
          <h3 class="text-lg font-semibold text-text-primary tracking-tight">
            {{ project.title }}
          </h3>

          <p class="mt-3 text-[14px] text-text-secondary leading-relaxed flex-1">
            {{ project.description }}
          </p>

          <div class="mt-5 flex flex-wrap items-center gap-x-2 text-[12px] text-text-muted">
            @for (tech of project.technologies; track tech; let last = $last) {
              <span>{{ tech }}</span>
              @if (!last) {
                <span class="text-border-hover select-none">&middot;</span>
              }
            }
          </div>

          <div class="mt-6 flex gap-5 text-[13px]">
            <a
              [href]="project.github"
              target="_blank"
              rel="noopener noreferrer"
              class="text-text-secondary hover:text-accent transition-colors inline-flex items-center gap-1"
            >
              GitHub
              <span class="text-[12px] transition-transform inline-block">&rarr;</span>
            </a>
            @if (project.link) {
              <a
                [href]="project.link.url"
                target="_blank"
                rel="noopener noreferrer"
                class="text-text-secondary hover:text-accent transition-colors inline-flex items-center gap-1"
              >
                {{ project.link.label }}
                <span class="text-[12px] transition-transform inline-block">&rarr;</span>
              </a>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
